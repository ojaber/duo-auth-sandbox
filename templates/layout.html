<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Duo Universal Prompt 2FA integration testing sandbox">
    <meta name="theme-color" content="#0a0e1a">
    <title>{% block title %}Duo 2FA Demo{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
    // Prevent FOUC: apply theme before paint
    (function() {
        var saved = localStorage.getItem('duo-theme');
        var preferred = (!saved && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : saved;
        if (preferred === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
    </script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div class="sandbox-banner">
        <div class="sandbox-content">
            <span class="sandbox-icon" aria-hidden="true">&#x1F9EA;</span>
            <span class="sandbox-text">Developer Testing Sandbox</span>
            <span class="sandbox-badge">Demo Mode</span>
        </div>
    </div>

    <div class="app-container">
        <header class="app-header" role="banner">
            <div class="logo">
                <span class="logo-icon" aria-hidden="true">
                    <span class="logo-bracket">{</span><span class="logo-duo">duo</span><span class="logo-bracket">}</span>
                </span>
                <span class="logo-text">2FA Testing Lab</span>
                <span class="version-badge">v1.0</span>
            </div>
            <button
                class="theme-toggle-btn"
                id="theme-toggle"
                role="switch"
                aria-checked="false"
                aria-label="Switch to light mode"
                title="Toggle light/dark mode"
            >
                <span class="toggle-track" aria-hidden="true">
                    <span class="toggle-thumb"></span>
                    <span class="toggle-icon toggle-icon--sun">&#9728;</span>
                    <span class="toggle-icon toggle-icon--moon">&#9790;</span>
                </span>
            </button>
        </header>
        <main class="app-main" id="main-content" role="main">
            {% block content %}{% endblock %}
        </main>
        <footer class="app-footer" role="contentinfo">
            <div class="footer-content">
                <span>Duo Universal Prompt</span>
                <span class="footer-divider">|</span>
                <span>Flask Demo</span>
                <span class="footer-divider">|</span>
                <span class="api-status">
                    <span class="status-indicator" aria-hidden="true"></span>
                    API Connected
                </span>
            </div>
        </footer>
    </div>

    {% block scripts %}{% endblock %}
    <script>
    (function() {
        var btn = document.getElementById('theme-toggle');
        if (!btn) return;

        function isLight() {
            return document.documentElement.getAttribute('data-theme') === 'light';
        }

        function updateBtn(light) {
            btn.setAttribute('aria-checked', light ? 'true' : 'false');
            btn.setAttribute('aria-label', light ? 'Switch to dark mode' : 'Switch to light mode');
            btn.setAttribute('title', light ? 'Switch to dark mode' : 'Switch to light mode');
        }

        // Set initial button state
        updateBtn(isLight());

        btn.addEventListener('click', function() {
            var nowLight = !isLight();
            if (nowLight) {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('duo-theme', 'light');
            } else {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('duo-theme', 'dark');
            }
            updateBtn(nowLight);
        });
    })();
    </script>
</body>
</html>
